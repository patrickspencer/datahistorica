<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Portfolio Tracker{{end}}</title>
    <script>(function(){try{var t=localStorage.getItem("theme");if(!t&&window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)t="dark";if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="/static/style.css?v=20260515-7">
</head>
<body>
    <div class="container">
        {{template "nav" .}}

        <main>
            {{block "content" .}}{{end}}
        </main>

        <footer>
            <p>Data updated daily. For informational purposes only. Not financial advice.</p>
            <p>Strategy Tracker &copy; 2026</p>
        </footer>
    </div>


</body>
</html>
