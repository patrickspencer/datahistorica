name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}  # Should be 'deploy'
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Fix ownership and permissions
          sudo chown -R deploy:deploy /opt/datahistorica
          git config --global --add safe.directory /opt/datahistorica

          # Pull latest code
          cd /opt/datahistorica
          git pull origin main

          # Build application
          /usr/local/go/bin/go build -buildvcs=false -o main .

          # Set ownership for running service
          sudo chown datahistorica:datahistorica main

          # Restart services
          sudo systemctl restart datahistorica
          sudo systemctl reload caddy

          echo "✅ Deployment completed successfully!"
