name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}  # Should be 'deploy'
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Configure git safe directory
          git config --global --add safe.directory /opt/datahistorica

          # Navigate to application directory
          cd /opt/datahistorica

          # Pull latest code
          git pull origin main

          # Build application (deploy user should have write access)
          /usr/local/go/bin/go build -buildvcs=false -o main.new .

          # Make binary executable
          chmod +x main.new

          # Atomically replace old binary with new one
          mv main.new main

          # Use passwordless sudo commands (must be configured in /etc/sudoers.d/)
          /usr/bin/sudo /bin/systemctl restart datahistorica
          /usr/bin/sudo /bin/systemctl reload caddy

          echo "✅ Deployment completed successfully!"
